<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- 
      <link href="/static/stylesheet.css" rel="stylesheet">
    -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js" integrity="sha384-Akqfrbj/HpNVo8k11SXBb6TlBWmXXlYQrCSqEWmyKJe+hDm3Z/B2WVG4smwBkRVm" crossorigin="anonymous"></script>

    <!-- Import Vega & Vega-Lite (does not have to be from CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@4"></script>
    <!-- Import vega-embed -->
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <title>TITLE GOES HERE</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-light bg-light">
      <div class="container">
        <a href="#" class="navbar-brand">axum-boilerplate</a>
        <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <div class="navbar-nav">
            <a href="#" class="nav-item nav-link active">Home</a>
            <a href="#" class="nav-item nav-link">Items</a>
          </div>
          <div class="navbar-nav ms-auto">
            <a href="/logout" class="nav-item nav-link">Logout</a>
          </div>
        </div>
      </div>
    </nav>
    <div class="container">
      <div id="content">
        <div class="mt-2 border-5 w-100">
          <button 
            data-bs-toggle="modal"
            data-bs-target="#new-goal-modal"
            class="btn btn-primary">
            New
          </button>
        </div>
        <table class="table-bordered w-100 border mt-2">
            <tr>
              <td>goal-01 title</td>
              <td>goal-01 desciption</td>
              <td>goal-01 notes</td>
            </tr>
            <tr>
              <td>goal-02 title</td>
              <td>goal-02 desciption</td>
              <td>goal-02 notes</td>
            </tr>
        </table>
      </div>
      <!-- modal -->
      <div id="new-goal-modal"
        class="modal modal-blur fade"
        style="display: none"
        aria-hidden="false"
        tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">New Goal</h5>
            </div>
            <form>
              <div class="modal-body">
                <div>
                  <label for="goal-title" class="form-label">Title<span class="text-danger">*</span></label>
                  <input id="goal-title" type="text" class="form-control" required>
                </div>
                <div class="mt-3">
                  <label for="goal-description" class="form-label">Description<span class="text-danger">*</span></label>
                  <input id="goal-description" type="text" class="form-control" required>
                </div>
                <div class="mt-3">
                  <label for="goal-notes" class="form-label">Notes</label>
                  <input id="goal-notes" type="text" class="form-control">
                </div>
              </div>
              <div class="modal-footer">
                <button type="button"
                  class="btn btn-primary"
                  data-bs-dismiss="modal">
                  Create
                </button>
                <button type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal">
                  Close
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <!-- end modal -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
