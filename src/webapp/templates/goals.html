{% extends "layout.html" %}
{% block title %}
  {% if title %}
    {{title}}
  {% else %}
    {{super()}}
  {% endif %}
{% endblock title %}
{% block content %}
<div class="container">
  <div class="mt-2 border-5 w-100">
    <button class="btn btn-primary">
      New
    </button>
  </div>
  <table class="table-bordered w-100 border mt-2">
    {% for goal in goals %}
      <tr>
        <td>{{ goal["title"] }}</td>
        <td>{{ goal["description"] }}</td>
        <td>{{ goal["notes"] }}</td>
      </tr>
    {% endfor %}
  </table>
</div>
{% endblock content %}
