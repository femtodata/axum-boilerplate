{% extends "layout.html" %}
{% block title %}
  {% if title %}
    {{title}}
  {% else %}
    {{super()}}
  {% endif %}
{% endblock title %}
{% block content %}
  <div class="mt-2 border-5 w-100">
    <button 
      id="button-new"
      hx-get="/goals/new"
      hx-push-url="true"
      hx-target="#new-goal-modal-content"
      hx-trigger="click"
      data-bs-toggle="modal"
      data-bs-target="#new-goal-modal"
      class="btn btn-primary">
      New
    </button>
  </div>
  <div id="goals-table">
    {% include "fragments/goal-table.html" %}
  </div>
  <!-- modal -->
  <div id="new-goal-modal"
    class="modal modal-blur fade"
    style="display: none"
    aria-hidden="false"
    tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div id="new-goal-modal-content" class="modal-content">
      </div>
    </div>
  </div>
  <script>
  const goalModal = new bootstrap.Modal('#new-goal-modal');
  function closeGoalModal() {
    goalModal.hide();
    history.pushState({}, "", "/goals");
  };
  document.body.addEventListener("trigger_close", function(evt){
    closeGoalModal();
  });
  {% if trigger_new %}
    window.onload = function() {
      document.getElementById('button-new').click();
    };
  {% endif %}
  </script>
  <!-- end modal -->
{% endblock content %}
