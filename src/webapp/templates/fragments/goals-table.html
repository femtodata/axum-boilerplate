  <table class="table-bordered w-100 border mt-2">
    {% for goal in goals %}
      <tr>
        <td>
          <a href="#"
            hx-get="/goals/{{ goal['id']}}"
            hx-target="#goals-modal-content"
            data-bs-toggle="modal"
            data-bs-target="#goals-modal">
            {{ goal["title"] }}
          </a>
        </td>
        <td>{{ goal["description"] }}</td>
      </tr>
    {% endfor %}
  </table>
