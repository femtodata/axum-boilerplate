  <div class="h-100 pt-3">
    <div class="h-100 border"
    style="
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: 1fr;
    ">
      {% for week in weeks %}
        {% for day in week %}
          <div class="border"
            style="position: relative;">
            <div>
              {{ day.display_str }}
            </div>
          </div>
        {% endfor %}
      {% endfor %}
    </div>
  </div>
