  <div class="h-100 pt-3">
    <div class="h-100 border"
    style="
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: auto repeat({{ weeks | length }}, .3fr);
      min-width: 0;
      min-height: 0;
    ">
      {% for day_of_week in days_of_week %}
        <div style="
          font-weight: bold;
          font-size: 0.75em;
          text-align: center;
        ">
          {{ day_of_week }}
        </div>
      {% endfor %}

      {% for week in weeks %}
        {% for day in week %}
          <div class="border"
            style="
              position: relative;
              overflow: hidden;
              min-width: 0;
              min-height: 0;
              font-size: 0.75em;
            ">
            <div
              style="
                font-weight: bold;
                text-align: center;
                position: sticky;
                top: 0px;
                background: #ffffff;
            ">
              {{ day.display_str }}
            </div>
            <div>
              Here's some text
            </div>
          </div>
        {% endfor %}
      {% endfor %}
    </div>
  </div>
