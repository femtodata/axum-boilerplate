  <div class="h-100 pt-3">
    <div class="h-100">

      <div
        style="
          height: 8%;
        "
      >
        <button 
          class="btn btn-primary"
          style="
            height: 70%;
            line-height: 0.75em;
            font-size: 0.75em;
          "
        >Set Goals</button>
      </div>
      <div
        style="
          margin-top: 0;
          height: 92%;
          display: grid;
          grid-template-columns: repeat(7, 1fr);
          grid-template-rows: auto repeat({{ weeks | length }}, 1fr);
          min-width: 0;
          min-height: 0;
        "
      >
        {% for day_of_week in days_of_week %}
          <div 
            class="border-start border-top
              {% if loop.last %}
                border-end
              {% endif %}
            "
            style="
              font-weight: bold;
              font-size: 0.75em;
              text-align: center;
            "
          >
            {{ day_of_week }}
          </div>
        {% endfor %}

        {% for week in weeks %}
          {% for day in week %}
            <div 
              class="border-start border-bottom
                {% if loop.last %}
                  border-end
                {% endif %}
              "
              style="
                position: relative;
                overflow: hidden;
                min-width: 0;
                min-height: 0;
                font-size: 0.75em;
              ">
              <div
                style="
                  font-weight: bold;
                  text-align: center;
                  position: sticky;
                  top: 0px;
                  background: #ffffff;
              ">
                {{ day.display_str }}
              </div>
              <div class="mx-2">
                Calendar content
              </div>
            </div>
          {% endfor %}
        {% endfor %}
      </div>


    </div>


  </div>
